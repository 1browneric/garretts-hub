<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Simple Round Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,700&family=Barlow:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* Garrett's Hub identity: Masters green, warm white, gold.
   Score, FIR, GIR, putts — nothing else. */
:root{
  --green:#00432E; --green2:#0A5236; --green3:#116245;
  --paper:#F7F4EA; --cream:#F7F4EA; --cream-dim:#D9D2C0;
  --red:#A31621; --red2:#C22B33;
  --gold:#C2A14D; --gold-deep:#94742B;
  --sage:#9FC4B4; --line:rgba(255,255,255,.13);
  --serif:'Libre Baskerville',Georgia,serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
  --ink:#0B3D2C; --ink2:#12281F; --mut:#5C7A6B;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--green);color:var(--paper);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(130% 55% at 50% -12%, #0A5C40 0%, var(--green) 58%)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
input{font-family:inherit}

.masthead{padding:22px 18px 16px;text-align:center;border-bottom:1px solid var(--line)}
.crest{font-family:var(--mono);font-size:9px;letter-spacing:.42em;color:var(--gold);text-transform:uppercase;margin-bottom:7px}
.wordmark{font-family:var(--serif);font-weight:700;font-size:25px;line-height:1.1;color:var(--paper);margin:0 0 6px}
.wordmark em{font-style:italic;color:var(--gold)}
.rule{width:46px;height:2px;background:var(--gold);margin:0 auto 10px;opacity:.8}
.metain{display:flex;gap:8px;max-width:340px;margin:0 auto}
.metain input{flex:1;min-width:0;padding:9px 10px;border:1px solid var(--line);border-radius:9px;
  background:rgba(0,0,0,.18);color:var(--paper);font-family:var(--mono);font-size:12px;text-align:center}
.metain input::placeholder{color:var(--sage);opacity:.8}
.metain input:focus{outline:2px solid var(--gold-deep)}
.metain .din{flex:0 0 118px}

.main{flex:1;padding:16px 14px 90px}

/* totals bar */
.totcard{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px;
  position:sticky;top:10px;z-index:5;box-shadow:0 8px 24px rgba(0,15,9,.45)}
.tot{background:var(--green3);padding:11px 6px;text-align:center}
.tot .v{font-family:var(--serif);font-size:18px;color:var(--cream)}
.tot .v em{font-style:normal;color:var(--gold);font-size:13px}
.tot .k{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-top:4px}

/* hole cards */
.holecard{background:var(--cream);color:var(--ink2);border-radius:14px;margin-bottom:10px;
  padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.28)}
.hrow{display:flex;align-items:center;gap:10px}
.holenum{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--ink);width:64px;flex:none}
.parpick{display:flex;gap:5px;align-items:center;margin-right:auto}
.parchip{width:34px;height:34px;border-radius:9px;border:1.5px solid rgba(8,50,36,.3);
  font-family:var(--mono);font-size:14px;font-weight:700;color:var(--mut)}
.parchip.on{background:var(--ink);border-color:var(--ink);color:var(--gold)}
.step{display:flex;align-items:center;gap:6px}
.stepbtn{width:38px;height:38px;border-radius:10px;background:var(--ink);color:var(--cream);
  font-size:19px;font-weight:600;display:flex;align-items:center;justify-content:center}
.stepbtn:active{transform:scale(.95)}
.gross{width:40px;text-align:center;font-family:var(--mono);font-weight:700;font-size:22px;color:var(--ink2)}
.gross.blank{color:#AAB6AE}.gross.birdie{color:#94742B}.gross.over{color:#A31621}
.hrow2{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(8,50,36,.12)}
.stchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 13px;border-radius:999px;border:1.5px solid rgba(8,50,36,.3);color:var(--mut)}
.stchip.yes{background:var(--ink);border-color:var(--ink);color:var(--gold);font-weight:700}
.stchip.no{border-color:rgba(163,22,33,.55);color:#A31621;font-weight:700}
.stchip.na{opacity:.35;pointer-events:none}
.minstep{display:flex;align-items:center;gap:6px;margin-left:auto}
.minstep .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
.stmini{width:32px;height:32px;border-radius:8px;background:#E7E0CE;color:var(--ink);font-size:16px;
  font-weight:700;display:flex;align-items:center;justify-content:center}
.stmini:active{transform:scale(.94)}
.minstep b{font-family:var(--mono);font-size:15px;color:var(--ink2);min-width:18px;text-align:center}

.nine{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--sage);margin:18px 2px 10px}

.savebtn{margin-top:18px;width:100%;padding:15px;border-radius:12px;background:var(--gold);color:#3A2A00;
  font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:700}
.savebtn:active{transform:scale(.99)}
.saveout{margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--sage);text-align:center;line-height:1.7}
.saveout b{color:var(--gold)}
.mailbtn{display:block;text-align:center;margin:10px 0 0;padding:12px;border:1px solid var(--line);
  border-radius:12px;color:var(--cream);font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;text-decoration:none;background:var(--green3)}
.reset{margin-top:20px;width:100%;padding:12px;border:1px solid rgba(194,43,51,.5);
  border-radius:12px;color:var(--red2);font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <div class="crest">Garrett's Hub</div>
    <h1 class="wordmark">Simple <em>Round Tracker</em></h1>
    <div class="rule"></div>
    <div class="metain">
      <input type="text" id="in-course" placeholder="Course name" autocomplete="off">
      <input type="date" id="in-date" class="din" aria-label="Round date">
    </div>
  </header>
  <main class="main" id="main"></main>
</div>

<script>
(function(){
/* Score, FIR, GIR, putts per hole — no shot detail. Saves the round summary
   to Garrett's Golf Tracker 2026 sheet (same intake the other trackers use).
   ISOLATED — nothing here can reach Eric's sheet. */
var SHEET_HOOK = "https://script.google.com/macros/s/AKfycbxvJtmEqGijjff3QyzaTqWDD22oZXGL1Wq9vAYGGXlTxxHbmn5g9HqCNFJWCCE0PK4u/exec";
var EMAIL = "glovoy22@gmail.com";
var LS_KEY = "rt_garrett_simple_v1";

/* per hole: {par:3|4|5 (default 4), score, fir:"Y"|"N"|null, gir, putts} */
var holes = [];
for (var i = 0; i < 18; i++) holes.push({par:4, score:null, fir:null, gir:null, putts:null});
var course = "", rdate = "", saved = null;

function lsLoad(){
  try{
    var s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.holes && s.holes.length === 18){ holes = s.holes; course = s.course||""; rdate = s.rdate||""; }
  }catch(e){}
}
function lsSave(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({holes:holes, course:course, rdate:rdate})); }catch(e){}
}
function todayISO(){
  var d = new Date(), p = function(n){ return String(n).padStart(2,"0"); };
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}
function totals(){
  var t = {score:0, par:0, thru:0, f9:0, b9:0, fwH:0, fwP:0, girH:0, girP:0, putts:0};
  holes.forEach(function(h, i){
    if (h.score == null) return;
    t.thru++; t.score += h.score; t.par += h.par;
    if (i < 9) t.f9 += h.score; else t.b9 += h.score;
    if (h.par !== 3 && (h.fir === "Y" || h.fir === "N")){ t.fwP++; if (h.fir === "Y") t.fwH++; }
    if (h.gir === "Y" || h.gir === "N"){ t.girP++; if (h.gir === "Y") t.girH++; }
    t.putts += h.putts || 0;
  });
  return t;
}
function pm(score, par){
  if (score == null) return "";
  var d = score - par;
  return d === 0 ? "E" : d > 0 ? "+"+d : ""+d;
}
function summaryText(){
  var t = totals();
  var L = [];
  L.push("SIMPLE ROUND TRACKER - " + (course || "Unnamed course") + " - " + (rdate || todayISO()));
  L.push("Score " + t.score + " (" + t.f9 + "/" + t.b9 + ") - FW " + t.fwH + "/" + t.fwP +
         " - GIR " + t.girH + " - Putts " + t.putts);
  L.push("");
  holes.forEach(function(h, i){
    L.push("H" + (i+1) + " P" + h.par + ": " + (h.score == null ? "-" : h.score + " " + pm(h.score, h.par)) +
      (h.par !== 3 && h.fir ? " " + (h.fir === "Y" ? "FIR" : "no-FIR") : "") +
      (h.gir ? " " + (h.gir === "Y" ? "GIR" : "no-GIR") : "") +
      (h.putts != null ? " putts " + h.putts : ""));
  });
  return L.join("\n");
}

function render(){
  var t = totals();
  var toPar = t.thru ? pm(t.score, t.par) : "&mdash;";
  var html = '<div class="totcard">' +
    '<div class="tot"><div class="v">' + (t.thru ? t.score : "&mdash;") + ' <em>' + toPar + '</em></div><div class="k">Score</div></div>' +
    '<div class="tot"><div class="v">' + (t.fwP ? t.fwH + "/" + t.fwP : "&mdash;") + '</div><div class="k">FIR</div></div>' +
    '<div class="tot"><div class="v">' + (t.girP ? t.girH + "/" + t.girP : "&mdash;") + '</div><div class="k">GIR</div></div>' +
    '<div class="tot"><div class="v">' + (t.putts || "&mdash;") + '</div><div class="k">Putts</div></div>' +
    '</div>';
  holes.forEach(function(h, i){
    if (i === 0) html += '<div class="nine">Front nine</div>';
    if (i === 9) html += '<div class="nine">Back nine</div>';
    var par3 = h.par === 3;
    var gcls = h.score == null ? "blank" : h.score < h.par ? "birdie" : h.score > h.par ? "over" : "";
    var chips = [3,4,5].map(function(p){
      return '<button class="parchip ' + (h.par === p ? "on" : "") + '" data-i="' + i + '" data-par="' + p + '">' + p + '</button>';
    }).join("");
    var chip = function(key, lbl){
      var v = h[key];
      var cls = v === "Y" ? " yes" : v === "N" ? " no" : "";
      var mark = v === "Y" ? " &#10003;" : v === "N" ? " &#10007;" : "";
      var na = (key === "fir" && par3) ? " na" : "";
      return '<button class="stchip' + cls + na + '" data-i="' + i + '" data-tri="' + key + '">' + lbl + mark + '</button>';
    };
    html += '<div class="holecard">' +
      '<div class="hrow">' +
        '<div class="holenum">No. ' + (i+1) + '</div>' +
        '<div class="parpick">' + chips + '</div>' +
        '<div class="step">' +
          '<button class="stepbtn" data-i="' + i + '" data-step="-1" aria-label="decrease score">&minus;</button>' +
          '<div class="gross ' + gcls + '">' + (h.score == null ? "&mdash;" : h.score) + '</div>' +
          '<button class="stepbtn" data-i="' + i + '" data-step="1" aria-label="increase score">+</button>' +
        '</div>' +
      '</div>' +
      '<div class="hrow2">' +
        chip("fir", "FIR") + chip("gir", "GIR") +
        '<div class="minstep"><span class="lbl">Putts</span>' +
          '<button class="stmini" data-i="' + i + '" data-putt="-1">&minus;</button>' +
          '<b>' + (h.putts == null ? "&mdash;" : h.putts) + '</b>' +
          '<button class="stmini" data-i="' + i + '" data-putt="1">+</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  html += '<button class="savebtn" id="save">Save round &middot; send to my sheet</button>' +
    '<div class="saveout" id="saveout">' + (saved || "") + '</div>' +
    '<button class="reset" id="reset">Clear round</button>';
  document.getElementById("main").innerHTML = html;
  bind();
}

function bind(){
  document.querySelectorAll("[data-par]").forEach(function(el){
    el.onclick = function(){
      var h = holes[+el.dataset.i];
      h.par = +el.dataset.par;
      if (h.par === 3) h.fir = null;
      lsSave(); render();
    };
  });
  document.querySelectorAll("[data-step]").forEach(function(el){
    el.onclick = function(){
      var h = holes[+el.dataset.i], d = +el.dataset.step;
      h.score = h.score == null ? h.par : Math.max(1, Math.min(15, h.score + d));
      lsSave(); render();
    };
  });
  document.querySelectorAll("[data-tri]").forEach(function(el){
    el.onclick = function(){
      var h = holes[+el.dataset.i], k = el.dataset.tri;
      h[k] = h[k] == null ? "Y" : h[k] === "Y" ? "N" : null;
      lsSave(); render();
    };
  });
  document.querySelectorAll("[data-putt]").forEach(function(el){
    el.onclick = function(){
      var h = holes[+el.dataset.i], d = +el.dataset.putt;
      var cur = h.putts == null ? (d > 0 ? 1 : 0) : Math.max(0, Math.min(8, h.putts + d));
      h.putts = h.putts == null ? (d > 0 ? 2 : null) : cur;
      lsSave(); render();
    };
  });
  document.getElementById("save").onclick = saveRound;
  document.getElementById("reset").onclick = function(){
    if (!confirm("Clear this round from this phone?")) return;
    holes = [];
    for (var i = 0; i < 18; i++) holes.push({par:4, score:null, fir:null, gir:null, putts:null});
    saved = null; lsSave(); render();
  };
}

function saveRound(){
  var t = totals();
  var body = {
    date: rdate || todayISO(), course: course || "Unnamed course",
    par: holes.reduce(function(a,h){ return a + h.par; }, 0),
    score: t.score, front9: t.f9, back9: t.b9,
    fw: t.fwH, gir: t.girH, putts: t.putts
  };
  saved = "Sending&hellip;"; render();
  fetch(SHEET_HOOK, { method:"POST", headers:{"Content-Type":"text/plain"}, body: JSON.stringify(body) })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "sheet said not-ok");
      saved = "<b>Round sent to your Golf Tracker sheet.</b>" + mailLink();
      render();
    })
    .catch(function(){
      saved = "Could not reach the sheet — email the summary instead." + mailLink();
      render();
    });
}
function mailLink(){
  var href = "mailto:" + EMAIL + "?subject=" + encodeURIComponent(
    "Simple Round Tracker - " + (course || "Unnamed course") + " " + (rdate || todayISO())) +
    "&body=" + encodeURIComponent(summaryText());
  return '<a class="mailbtn" href="' + href + '">Email me a copy</a>';
}

var ci = document.getElementById("in-course"), di = document.getElementById("in-date");
ci.addEventListener("change", function(){ course = ci.value.trim(); lsSave(); });
di.addEventListener("change", function(){ rdate = di.value; lsSave(); });

lsLoad();
ci.value = course; di.value = rdate || todayISO();
render();
})();
</script>
</body>
</html>
