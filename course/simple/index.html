<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Simple Round Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,700&family=Barlow:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* Garrett's Hub identity: Masters green, warm white, gold.
   Same tracker frame, entry is just score, FIR, GIR, putts. */
:root{
  --green:#00432E; --green2:#0A5236; --green3:#116245;
  --paper:#F7F4EA; --paper2:#ECE6D5;
  --red:#B22234; --red2:#8F1B2A;
  --gold:#C2A14D; --gold-deep:#94742B;
  --sage:#9FC4B4; --line:rgba(255,255,255,.13);
  --serif:'Libre Baskerville',Georgia,serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
  --cream:#F7F4EA; --cream-dim:#D9D2C0;
  --ink:#0B3D2C; --ink2:#12281F; --mut:#5C7A6B; --mut2:#7E9488;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--green);color:var(--paper);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
.app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(130% 55% at 50% -12%, #0A5C40 0%, var(--green) 58%)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
input,select{font-family:inherit}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.masthead{padding:22px 18px 16px;text-align:center;border-bottom:1px solid var(--line)}
.wordmark{font-family:var(--serif);font-weight:700;font-size:25px;line-height:1.1;color:var(--paper);margin:0 0 6px}
.wordmark em{font-style:italic;color:var(--gold)}
.rule{width:46px;height:2px;background:var(--gold);margin:0 auto 10px;opacity:.8}
.metain{display:flex;gap:8px;max-width:340px;margin:0 auto}
.metain input{flex:1;min-width:0;padding:9px 10px;border:1px solid var(--line);border-radius:9px;
  background:rgba(0,0,0,.18);color:var(--paper);font-family:var(--mono);font-size:12px;text-align:center}
.metain input::placeholder{color:var(--sage);opacity:.8}
.metain input:focus{outline:2px solid var(--gold-deep)}
.metain .din{flex:0 0 118px}

.tabs{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;
  background:rgba(0,41,28,.94);backdrop-filter:blur(6px)}
.tab{flex:1;padding:13px 0 11px;font-family:var(--mono);font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--sage);border-bottom:2px solid transparent}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

.main{flex:1;padding:16px 14px 40px}

/* ---- hole card ---- */
.holecard{background:var(--cream);color:var(--ink2);border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.holehead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px dashed rgba(8,50,36,.25)}
.holenum{font-family:var(--serif);font-size:32px;line-height:1;color:var(--ink)}
.parpick{display:flex;gap:6px;align-items:center}
.parpick .plbl{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);margin-right:2px}
.parchip{width:42px;height:42px;border-radius:11px;border:1.5px solid rgba(8,50,36,.3);
  font-family:var(--mono);font-size:16px;font-weight:700;color:var(--mut)}
.parchip.on{background:var(--ink);border-color:var(--ink);color:var(--gold)}
.scorerow{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(8,50,36,.12)}
.scorelbl{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut)}
.scorelbl .pm{display:block;font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.04em;margin-top:3px}
.step{display:flex;align-items:center;gap:8px}
.stepbtn{width:44px;height:44px;border-radius:12px;background:var(--ink);color:var(--cream);
  font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center}
.stepbtn:active{transform:scale(.95)}
.gross{width:52px;text-align:center;font-family:var(--mono);font-weight:700;font-size:28px;color:var(--ink2)}
.gross.blank{color:#AAB6AE}.gross.birdie{color:#1E8E4F}.gross.over{color:#B22234}

.statgrid{display:flex;align-items:center;gap:10px;padding:13px 16px;flex-wrap:wrap}
.stchip{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  padding:9px 14px;border-radius:999px;border:1.5px solid rgba(8,50,36,.3);color:var(--mut)}
.stchip.yes{background:var(--ink);border-color:var(--ink);color:var(--gold);font-weight:700}
.stchip.no{border-color:rgba(178,34,52,.55);color:#B22234;font-weight:700}
.minstep{display:flex;align-items:center;gap:7px;margin-left:auto}
.minstep .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
.stmini{width:36px;height:36px;border-radius:9px;background:#E7E0CE;color:var(--ink);font-size:17px;
  font-weight:700;display:flex;align-items:center;justify-content:center}
.stmini:active{transform:scale(.94)}
.minstep b{font-family:var(--mono);font-size:16px;color:var(--ink2);min-width:20px;text-align:center}

/* caddy card */
.caddy{margin-top:14px;background:var(--cream);color:var(--ink2);border-radius:16px;
  padding:14px 12px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.caddyhead{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--mut);margin-bottom:10px;text-align:center}
.edrow{display:flex;gap:8px}
.edrow + .edrow{margin-top:8px}
.edfield{flex:1;min-width:0}
.edfield .edlbl{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);
  margin:0 0 5px;white-space:nowrap}
.edfield input,.edfield select{width:100%;height:46px;padding:0 10px;border:1.5px solid rgba(8,50,36,.25);border-radius:10px;
  background:#fff;font-family:var(--mono);font-size:15px;font-weight:700;color:var(--ink2);
  -webkit-appearance:none;appearance:none}
.edfield input{text-align:center}
.edfield select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%234B5B44'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:28px}
.caddyask{display:block;width:100%;margin-top:10px;padding:13px;border-radius:10px;background:var(--ink);
  color:var(--gold);font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700}
.caddyout{font-family:var(--mono);font-size:13px;color:var(--ink2);line-height:1.7;padding:10px 4px 0;text-align:center}
.caddyout:empty{display:none}
.caddytabs{display:flex;gap:6px;margin-bottom:12px}
.caddytab{flex:1;padding:9px 4px;border-radius:9px;border:1.5px solid rgba(8,50,36,.2);
  font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
.caddytab.on{background:var(--ink);border-color:var(--ink);color:var(--gold);font-weight:700}
.chart{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px;color:var(--ink2)}
.chart th{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:600;
  padding:6px 4px;border-bottom:1.5px solid var(--ink);text-align:center}
.chart th:first-child{text-align:left}
.chart td{padding:7px 4px;text-align:center;border-bottom:1px solid rgba(8,50,36,.1)}
.chart td.cl{text-align:left;font-weight:700;color:var(--ink)}
.chart td.mut{color:var(--mut2)}
.chart .par{color:#B22234;font-size:11px}
.windsub{display:flex;gap:6px;margin-bottom:10px}
.windbtn{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid rgba(8,50,36,.2);
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
.windbtn.on{background:var(--green2);border-color:var(--green2);color:#fff;font-weight:700}

/* hole nav */
.holenav{display:flex;align-items:center;gap:10px}
.holenav.top{margin-bottom:12px}
.holenav.bottom{margin-top:16px}
.holenav .navbtn{flex:1;padding:13px 0;border-radius:11px;background:var(--green3);color:var(--paper);
  font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--line);text-align:center}
.holenav .navbtn.dis{opacity:.4}
.navnow{flex:none;font-family:var(--serif);font-weight:700;font-size:17px;color:var(--gold);min-width:60px;text-align:center}

/* ---- overview ---- */
.totcard{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px}
.tot{background:var(--green3);padding:13px 8px;text-align:center}
.tot .v{font-family:var(--serif);font-size:20px;color:var(--cream)}
.tot .v em{font-style:normal;color:var(--gold);font-size:15px}
.tot .k{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--sage);margin-top:4px}
.secthead{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--sage);margin:20px 0 10px}
.gridwrap{overflow-x:auto;background:var(--cream);border-radius:14px;padding:6px 4px}
.grid{border-collapse:collapse;font-family:var(--mono);font-size:12px;color:var(--ink2);min-width:100%}
.grid th{font-size:9px;letter-spacing:.14em;color:var(--mut);padding:6px 5px;text-transform:uppercase;
  border-bottom:1.5px solid var(--ink);text-align:center;font-weight:600}
.grid td{padding:6px 5px;text-align:center;border-bottom:1px solid rgba(8,50,36,.14)}
.grid td.hn{font-weight:700;color:var(--ink)}
.grid tr.sumrow td{border-top:2px solid var(--ink);font-weight:700;color:var(--ink)}
.sc{font-weight:700}
.sc.bird{color:#1E8E4F}.sc.bog{color:#B22234}
.ok{color:var(--ink);font-weight:700}
.miss{color:#B22234}

.savebtn{margin-top:18px;width:100%;padding:15px;border-radius:12px;background:var(--gold);color:#3A2A00;
  font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:700}
.savebtn:active{transform:scale(.99)}
.saveout{margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--sage);text-align:center;line-height:1.7}
.saveout b{color:var(--gold)}
.mailbtn{display:block;text-align:center;margin:10px 0 0;padding:12px;border:1px solid var(--line);
  border-radius:12px;color:var(--cream);font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  text-transform:uppercase;text-decoration:none;background:var(--green3)}
.reset{margin-top:22px;width:100%;padding:12px;border:1px solid rgba(194,43,51,.5);
  border-radius:12px;color:var(--red2);font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
  <header class="masthead">
    <h1 class="wordmark">Simple <em>Round Tracker</em></h1>
    <div class="rule"></div>
    <div class="metain">
      <input type="text" id="in-course" placeholder="Course name" autocomplete="off">
      <input type="date" id="in-date" class="din" aria-label="Round date">
    </div>
  </header>
  <nav class="tabs" role="tablist">
    <button class="tab on" data-tab="hole" role="tab">Hole</button>
    <button class="tab" data-tab="overview" role="tab">Overview</button>
  </nav>
  <main class="main" id="main"></main>
</div>

<script>
(function(){
/* Score, FIR, GIR, putts per hole — the tracker frame without shot detail.
   Saves the round summary to Garrett's Golf Tracker 2026 sheet.
   ISOLATED — nothing here can reach Eric's sheet. Saved on this phone (localStorage). */
var SHEET_HOOK = "https://script.google.com/macros/s/AKfycbxvJtmEqGijjff3QyzaTqWDD22oZXGL1Wq9vAYGGXlTxxHbmn5g9HqCNFJWCCE0PK4u/exec";
var EMAIL = "glovoy22@gmail.com";
var LS_KEY = "rt_garrett_simple_v2";

/* caddie — same numbers as the other trackers */
var CODES=['D','MD','7w','3H','4i','5H','6i','7i','8i','9i','PW','48','52','56','58'];
var CODE_NAME={D:'Driver',MD:'Mini Driver','7w':'7 Wood','3H':'3 Hybrid','4i':'4 Iron','5H':'5 Hybrid',
  '6i':'6 Iron','7i':'7 Iron','8i':'8 Iron','9i':'9 Iron',PW:'PW','48':'AW','52':'52°','56':'56°','58':'58°'};
var CADDY={
  D:{c:[275,295],h:[[269,288],[262,279],[248,262]],t:[[281,302],[286,308],[294,318]],i:[[271,290],[266,284],[256,272]],d:[[279,300],[283,305],[288,311]],xl:[21,28,43],xr:[7,0,-14]},
  MD:{c:[240,265],h:[[236,260],[230,253],[220,240]],t:[[244,270],[248,275],[256,285]],i:[[237,261],[233,256],[226,248]],d:[[243,269],[246,272],[251,279]],xl:[17,23,36],xr:[4.5,-2,-15]},
  '7w':{c:[225,245],h:[[221,240],[215,233],[205,221]],t:[[229,250],[233,255],[241,264]],i:[[222,241],[218,237],[211,228]],d:[[228,249],[231,252],[236,258]],xl:[17,23,35],xr:[4,-2,-15]},
  '3H':{c:[220,235],h:[[216,230],[210,223],[200,211]],t:[[224,240],[228,244],[236,254]],i:[[217,231],[213,227],[206,219]],d:[[223,239],[226,242],[231,248]],xl:[16,22,35],xr:[4,-2,-14]},
  '4i':{c:[215,225],h:[[211,220],[205,213],[195,201]],t:[[219,230],[223,234],[231,244]],i:[[212,221],[208,217],[201,209]],d:[[218,229],[221,232],[226,238]],xl:[15,20,32],xr:[3,-2,-13]},
  '5H':{c:[200,215],h:[[196,210],[192,206],[182,194]],t:[[204,220],[208,224],[214,232]],i:[[197,211],[194,208],[187,200]],d:[[203,219],[206,222],[210,227]],xl:[12,16,26],xr:[2,-3,-12]},
  '6i':{c:[193,207],h:[[189,202],[185,198],[179,190]],t:[[197,212],[199,214],[205,221]],i:[[190,203],[187,200],[183,195]],d:[[196,211],[197,212],[201,216]],xl:[10,15,24],xr:[2,-3,-12]},
  '7i':{c:[184,195],h:[[180,190],[178,188],[170,179]],t:[[188,200],[190,202],[194,207]],i:[[181,192],[180,190],[174,183]],d:[[187,198],[188,200],[191,203]],xl:[9,13,21],xr:[1,-3,-11]},
  '8i':{c:[168,179],h:[[165,175],[162,172],[156,165]],t:[[171,183],[173,185],[177,190]],i:[[166,177],[164,174],[160,170]],d:[[170,181],[172,184],[174,186]],xl:[7,11,17],xr:[1,-3,-10]},
  '9i':{c:[152,163],h:[[150,161],[148,158],[142,151]],t:[[154,165],[156,168],[160,172]],i:[[151,162],[149,159],[145,155]],d:[[153,164],[155,167],[158,170]],xl:[6,9,14],xr:[0,-3,-9]},
  PW:{c:[138,144],h:[[136,142],[134,139],[130,135]],t:[[140,146],[142,149],[144,151]],i:[[137,143],[135,141],[132,137]],d:[[139,145],[141,147],[142,149]],xl:[4,7,12],xr:[0,-3,-8]},
  '48':{c:[127,131],h:[[125,129],[123,126],[121,124]],t:[[129,133],[131,136],[133,138]],i:[[126,130],[124,128],[123,126]],d:[[128,132],[130,134],[131,136]],xl:[4,6,10],xr:[0,-2,-6]},
  '52':{c:[114,119],h:[[112,117],[112,117],[108,112]],t:[[116,121],[116,121],[118,124]],i:[[113,118],[113,118],[110,114]],d:[[115,120],[115,120],[117,122]],xl:[3,4.5,8],xr:[0,-1.5,-4.5]},
  '56':{c:[103,108],h:[[102,107],[100,105],[98,102]],t:[[104,109],[105,110],[106,111]],i:[[102,107],[101,106],[99,103]],d:[[104,109],[104,109],[105,110]],xl:[2,3,5],xr:[0,-1,-3]},
  '58':{c:[95,98],h:[[94,97],[93,96],[91,93]],t:[[96,99],[97,100],[98,101]],i:[[94,97],[94,97],[92,95]],d:[[96,99],[96,99],[97,100]],xl:[2,3,4.5],xr:[0,-1,-3]}
};
var WIND_DIRS=[['calm','Calm'],['into','Into (headwind)'],['down','Down (tailwind)'],['lr','Cross, L to R'],
  ['rl','Cross, R to L'],['il','Into, off the left'],['ir','Into, off the right'],['dl','Down, off the left'],['dr','Down, off the right']];

/* per hole: par 3|4|5 (default 4), score, fir "Y"|"N"|null, gir, putts */
var holes = [];
function freshHoles(){ var a=[]; for (var i=0;i<18;i++) a.push({par:4,score:null,fir:null,gir:null,putts:null}); return a; }
holes = freshHoles();
var course = "", rdate = "", saved = null;
var tab = "hole", hole = 1;
var caddyIn = { dist:null, cap:null, mph:null, dir:"calm", out:"" };
var caddyTab = "swing", windTab = "into";

function lsLoad(){
  try{
    var s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.holes && s.holes.length === 18){ holes = s.holes; course = s.course||""; rdate = s.rdate||""; }
  }catch(e){}
}
function lsSave(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({holes:holes, course:course, rdate:rdate})); }catch(e){}
}
function todayISO(){
  var d = new Date(), p = function(n){ return String(n).padStart(2,"0"); };
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}
function pm(score, par){
  if (score == null) return "";
  var d = score - par;
  return d === 0 ? "E" : d > 0 ? "+"+d : ""+d;
}
function totals(){
  var t = {score:0, par:0, thru:0, f9:0, b9:0, fwH:0, fwP:0, girH:0, girP:0, putts:0};
  holes.forEach(function(h, i){
    if (h.score == null) return;
    t.thru++; t.score += h.score; t.par += h.par;
    if (i < 9) t.f9 += h.score; else t.b9 += h.score;
    if (h.par !== 3 && (h.fir === "Y" || h.fir === "N")){ t.fwP++; if (h.fir === "Y") t.fwH++; }
    if (h.gir === "Y" || h.gir === "N"){ t.girP++; if (h.gir === "Y") t.girH++; }
    t.putts += h.putts || 0;
  });
  return t;
}
function roundPar(){ return holes.reduce(function(a,h){ return a + h.par; }, 0); }

/* ---------- caddie engine ---------- */
function windInterp(vals,calm,mph){
  var pts=[[0,calm],[5,vals[0]],[10,vals[1]],[20,vals[2]]],m=Math.max(0,Math.min(mph,20));
  for(var i=1;i<pts.length;i++){
    if(m<=pts[i][0]){
      var m0=pts[i-1][0],v0=pts[i-1][1],m1=pts[i][0],v1=pts[i][1],f=(m-m0)/(m1-m0||1);
      return [v0[0]+f*(v1[0]-v0[0]),v0[1]+f*(v1[1]-v0[1])];
    }
  }
  return pts[3][1];
}
function driftInterp(vals,mph){
  var pts=[[0,0],[5,vals[0]],[10,vals[1]],[20,vals[2]]],m=Math.max(0,Math.min(mph,20));
  for(var i=1;i<pts.length;i++){
    if(m<=pts[i][0]){
      var m0=pts[i-1][0],v0=pts[i-1][1],m1=pts[i][0],v1=pts[i][1];
      return v0+(m-m0)/(m1-m0||1)*(v1-v0);
    }
  }
  return vals[2];
}
function caddyEval(club,dir,mph){
  var s=CADDY[club],ct,drft=0,shape='';
  if(dir==='into')ct=windInterp(s.h,s.c,mph);
  else if(dir==='down')ct=windInterp(s.t,s.c,mph);
  else if(dir==='il'||dir==='ir')ct=windInterp(s.i,s.c,mph);
  else if(dir==='dl'||dir==='dr')ct=windInterp(s.d,s.c,mph);
  else ct=[s.c[0],s.c[1]];
  if(dir==='lr')drft=driftInterp(s.xl,mph);
  else if(dir==='rl')drft=driftInterp(s.xr,mph);
  else if(dir==='il'||dir==='dl'){drft=0.7*driftInterp(s.xl,mph);shape='adds to a fade';}
  else if(dir==='ir'||dir==='dr'){drft=0.7*driftInterp(s.xr,mph);shape='flies straighter than a stock fade';}
  return {carry:ct[0],total:ct[1],drift:drft,shape:shape};
}
function caddyPick(dist,dir,mph,cap){
  var best=null;
  CODES.forEach(function(c){
    var e=caddyEval(c,dir,mph);
    if(cap!=null&&e.total>cap)return;
    var score=e.carry<dist?(dist-e.carry)*1.25:e.carry-dist;
    if(!best||score<best.score){best={club:c,score:score,carry:e.carry,total:e.total,drift:e.drift,shape:e.shape};}
  });
  if(!best)return 'No club fits under that cap.';
  var wc=Math.round(best.carry),wt=Math.round(best.total);
  var lines=[(dir!=='calm'&&mph>0)?best.club+' plays '+wc+' ('+wt+') in this wind.':best.club+' - '+wc+' ('+wt+').'];
  var d=Math.round(Math.abs(best.drift));
  if(d>=2){
    var side=best.drift>0?'right':'left',aim=best.drift>0?'left':'right';
    lines.push('Wind pushes it ~'+d+' yds '+side+' - aim '+d+' yds '+aim+' of target.');
  } else if(dir!=='calm'&&mph>0){
    lines.push('Play it straight at your target.');
  }
  if(best.shape)lines.push('Shape: '+best.shape+'.');
  return lines.join('<br>');
}

/* ---------- rendering ---------- */
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }
function scoreClass(g, par){
  if (g==null) return "blank";
  return g<par ? "birdie" : g>par ? "over" : "";
}
function render(){
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.toggle("on", b.dataset.tab===tab); });
  document.getElementById("main").innerHTML = tab==="hole" ? viewHole() : viewOverview();
  bind();
}

function holeNav(pos){
  var prev = hole > 1 ? '<button class="navbtn" data-act="prev">&larr; No. '+(hole-1)+'</button>'
                      : '<span class="navbtn dis">Front</span>';
  var next = hole < 18 ? '<button class="navbtn" data-act="next">No. '+(hole+1)+' &rarr;</button>'
                       : '<span class="navbtn dis">Home</span>';
  return '<div class="holenav '+pos+'">'+prev+'<div class="navnow">No. '+hole+'</div>'+next+'</div>';
}

function viewHole(){
  var h = holes[hole-1];
  var par3 = h.par === 3;
  var chips = [3,4,5].map(function(p){
    return '<button class="parchip '+(h.par===p?"on":"")+'" data-parval="'+p+'">'+p+'</button>';
  }).join("");
  var chip = function(key, lbl){
    if (key === "fir" && par3) return "";
    var v = h[key];
    var cls = v === "Y" ? " yes" : v === "N" ? " no" : "";
    var mark = v === "Y" ? " &#10003;" : v === "N" ? " &#10007;" : "";
    return '<button class="stchip'+cls+'" data-tri="'+key+'">'+lbl+mark+'</button>';
  };
  return holeNav("top") +
  '<section class="holecard">' +
    '<div class="holehead">' +
      '<div class="holenum">No. '+hole+'</div>' +
      '<div class="parpick"><span class="plbl">Par</span>'+chips+'</div>' +
    '</div>' +
    '<div class="scorerow">' +
      '<div class="scorelbl">Score<span class="pm">'+(pm(h.score, h.par) || "&mdash;")+'</span></div>' +
      '<div class="step">' +
        '<button class="stepbtn" data-act="dec" aria-label="decrease score">&minus;</button>' +
        '<div class="gross '+scoreClass(h.score, h.par)+'">'+(h.score == null ? "&mdash;" : h.score)+'</div>' +
        '<button class="stepbtn" data-act="inc" aria-label="increase score">+</button>' +
      '</div>' +
    '</div>' +
    '<div class="statgrid">' +
      chip("fir","FIR") + chip("gir","GIR") +
      '<div class="minstep"><span class="lbl">Putts</span>' +
        '<button class="stmini" data-act="puttdec">&minus;</button><b>'+(h.putts == null ? "&mdash;" : h.putts)+'</b>' +
        '<button class="stmini" data-act="puttinc">+</button>' +
      '</div>' +
    '</div>' +
  '</section>' +
  '<section class="caddy">' +
    '<div class="caddyhead">Caddie</div>' +
    '<div class="caddytabs">' +
      '<button class="caddytab '+(caddyTab==="swing"?"on":"")+'" data-cad="swing">Swing Caddie</button>' +
      '<button class="caddytab '+(caddyTab==="dist"?"on":"")+'" data-cad="dist">My Bag</button>' +
      '<button class="caddytab '+(caddyTab==="wind"?"on":"")+'" data-cad="wind">Wind charts</button>' +
    '</div>' +
    '<div class="caddybody">'+caddyBody()+'</div>' +
  '</section>' +
  holeNav("bottom");
}

function caddyBody(){
  if (caddyTab === "dist"){
    var rows = CODES.map(function(c){
      return '<tr><td class="cl">'+CODE_NAME[c]+'</td><td>'+CADDY[c].c[0]+'</td><td class="mut">'+CADDY[c].c[1]+'</td></tr>';
    }).join("");
    return '<table class="chart"><thead><tr><th>Club</th><th>Carry</th><th>Total</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  if (caddyTab === "wind"){
    var subs=[["into","Into"],["down","Down"],["lr","L&rarr;R"],["rl","R&rarr;L"]];
    var bar='<div class="windsub">'+subs.map(function(a){
      return '<button class="windbtn '+(windTab===a[0]?"on":"")+'" data-wind="'+a[0]+'">'+a[1]+'</button>';
    }).join("")+'</div>';
    var head, rows;
    var driftFmt=function(n){return n===0?'&mdash;':(n>0?n+'R':(-n)+'L');};
    if (windTab==="lr"||windTab==="rl"){
      var key=windTab==="lr"?"xl":"xr";
      head='<th>Club</th><th>5</th><th>10</th><th>20</th>';
      rows=CODES.map(function(c){
        var s=CADDY[c],x=s[key],y=s.c[0];
        var cell=function(i){return y+' <span class="par">('+driftFmt(Math.round(x[i]))+')</span>';};
        return '<tr><td class="cl">'+CODE_NAME[c]+'</td><td>'+cell(0)+'</td><td>'+cell(1)+'</td><td>'+cell(2)+'</td></tr>';
      }).join("");
    } else {
      var k=windTab==="down"?"t":"h";
      head='<th>Club</th><th>Calm</th><th>5</th><th>10</th><th>20</th>';
      rows=CODES.map(function(c){
        var s=CADDY[c],w=s[k];
        return '<tr><td class="cl">'+CODE_NAME[c]+'</td><td class="mut">'+s.c[0]+'</td><td>'+w[0][0]+'</td><td>'+w[1][0]+'</td><td>'+w[2][0]+'</td></tr>';
      }).join("");
    }
    return bar+'<table class="chart"><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table>';
  }
  return '<div class="edrow">' +
    '<div class="edfield"><div class="edlbl">Distance (yd)</div><input type="number" inputmode="numeric" id="cd-dist" value="'+(caddyIn.dist ?? "")+'"></div>' +
    '<div class="edfield"><div class="edlbl">No longer than</div><input type="number" inputmode="numeric" id="cd-cap" value="'+(caddyIn.cap ?? "")+'"></div>' +
  '</div>' +
  '<div class="edrow">' +
    '<div class="edfield"><div class="edlbl">Wind (mph)</div><input type="number" inputmode="numeric" id="cd-mph" value="'+(caddyIn.mph ?? "")+'"></div>' +
    '<div class="edfield"><div class="edlbl">Wind direction</div><select id="cd-dir">'+WIND_DIRS.map(function(w){
      return '<option value="'+w[0]+'"'+(caddyIn.dir===w[0]?" selected":"")+'>'+w[1]+'</option>';
    }).join("")+'</select></div>' +
  '</div>' +
  '<button class="caddyask" data-act="caddy">Swing Caddie</button>' +
  '<div class="caddyout" id="caddyout">'+(caddyIn.out || "")+'</div>';
}

function viewOverview(){
  var t = totals();
  var toPar = t.thru ? pm(t.score, t.par) : "&mdash;";
  var tiles = '<div class="totcard">' +
    '<div class="tot"><div class="v">'+(t.thru?t.score:"&mdash;")+' <em>'+toPar+'</em></div><div class="k">Score &middot; thru '+t.thru+'</div></div>' +
    '<div class="tot"><div class="v">'+(t.f9||"&mdash;")+' / '+(t.b9||"&mdash;")+'</div><div class="k">Out / In</div></div>' +
    '<div class="tot"><div class="v">'+(t.putts||"&mdash;")+'</div><div class="k">Putts</div></div>' +
    '<div class="tot"><div class="v">'+(t.fwP?t.fwH+'/'+t.fwP:"&mdash;")+'</div><div class="k">Fairways</div></div>' +
    '<div class="tot"><div class="v">'+(t.girP?t.girH+'/'+t.girP:"&mdash;")+'</div><div class="k">Greens</div></div>' +
    '<div class="tot"><div class="v">'+roundPar()+'</div><div class="k">Par</div></div>' +
  '</div>';
  var rows = holes.map(function(h, i){
    var cls = h.score==null ? "" : h.score<h.par ? " bird" : h.score>h.par ? " bog" : "";
    var yn = function(v){ return v==="Y" ? '<span class="ok">&#10003;</span>' : v==="N" ? '<span class="miss">&#10007;</span>' : "&middot;"; };
    return '<tr><td class="hn">'+(i+1)+'</td><td>'+h.par+'</td>' +
      '<td class="sc'+cls+'">'+(h.score ?? "&middot;")+'</td>' +
      '<td>'+(h.par===3 ? "&mdash;" : yn(h.fir))+'</td><td>'+yn(h.gir)+'</td>' +
      '<td>'+(h.putts ?? "&middot;")+'</td></tr>';
  }).join("");
  var t2 = totals();
  var sum = '<tr class="sumrow"><td colspan="2">TOT</td><td>'+(t2.thru?t2.score:"&middot;")+'</td>' +
    '<td>'+(t2.fwP?t2.fwH+'/'+t2.fwP:"&middot;")+'</td><td>'+(t2.girP?t2.girH+'/'+t2.girP:"&middot;")+'</td>' +
    '<td>'+(t2.putts||"&middot;")+'</td></tr>';
  return tiles +
  '<div class="secthead">Hole by hole</div>' +
  '<div class="gridwrap"><table class="grid">' +
    '<thead><tr><th>Hole</th><th>Par</th><th>Score</th><th>FIR</th><th>GIR</th><th>Putts</th></tr></thead>' +
    '<tbody>'+rows+sum+'</tbody>' +
  '</table></div>' +
  '<button class="savebtn" data-act="saveround">Save round &middot; send to my sheet</button>' +
  '<div class="saveout" id="saveout">'+(saved || "")+'</div>' +
  '<button class="reset" data-act="reset">Clear round</button>';
}

/* ---------- events ---------- */
function bind(){
  var h = holes[hole-1];
  document.querySelectorAll("[data-act]").forEach(function(el){
    el.onclick = function(){
      var act = el.dataset.act;
      if (act==="prev"){ hole=Math.max(1,hole-1); render(); }
      else if (act==="next"){ hole=Math.min(18,hole+1); render(); }
      else if (act==="inc"||act==="dec"){
        h.score = h.score == null ? h.par : Math.max(1, Math.min(15, h.score + (act==="inc"?1:-1)));
        lsSave(); render();
      }
      else if (act==="puttinc"||act==="puttdec"){
        if (h.putts == null) h.putts = act==="puttinc" ? 2 : null;
        else h.putts = Math.max(0, Math.min(8, h.putts + (act==="puttinc"?1:-1)));
        lsSave(); render();
      }
      else if (act==="caddy"){
        var num=function(id){var v=document.getElementById(id).value.trim();if(v==="")return null;var n=Math.round(+v);return isFinite(n)?Math.max(0,Math.min(700,n)):null;};
        caddyIn.dist=num("cd-dist"); caddyIn.cap=num("cd-cap"); caddyIn.mph=num("cd-mph")||0;
        caddyIn.dir=document.getElementById("cd-dir").value;
        caddyIn.out = caddyIn.dist==null ? "Give me a distance first." : caddyPick(caddyIn.dist,caddyIn.dir,caddyIn.mph,caddyIn.cap);
        document.getElementById("caddyout").innerHTML = caddyIn.out;
      }
      else if (act==="saveround"){ saveRound(); }
      else if (act==="reset"){
        if (!confirm("Clear this round from this phone?")) return;
        holes = freshHoles(); saved = null; hole = 1; lsSave(); render();
      }
    };
  });
  document.querySelectorAll("[data-parval]").forEach(function(el){
    el.onclick = function(){
      h.par = +el.dataset.parval;
      if (h.par === 3) h.fir = null;
      lsSave(); render();
    };
  });
  document.querySelectorAll("[data-tri]").forEach(function(el){
    el.onclick = function(){
      var k = el.dataset.tri;
      h[k] = h[k] == null ? "Y" : h[k] === "Y" ? "N" : null;
      lsSave(); render();
    };
  });
  document.querySelectorAll("[data-cad]").forEach(function(el){
    el.onclick = function(){ caddyTab = el.dataset.cad; render(); };
  });
  document.querySelectorAll("[data-wind]").forEach(function(el){
    el.onclick = function(){ windTab = el.dataset.wind; render(); };
  });
}

function summaryText(){
  var t = totals();
  var L = [];
  L.push("SIMPLE ROUND TRACKER - " + (course || "Unnamed course") + " - " + (rdate || todayISO()));
  L.push("Score " + t.score + " (" + t.f9 + "/" + t.b9 + ") - FW " + t.fwH + "/" + t.fwP +
         " - GIR " + t.girH + " - Putts " + t.putts);
  L.push("");
  holes.forEach(function(h, i){
    L.push("H" + (i+1) + " P" + h.par + ": " + (h.score == null ? "-" : h.score + " " + pm(h.score, h.par)) +
      (h.par !== 3 && h.fir ? " " + (h.fir === "Y" ? "FIR" : "no-FIR") : "") +
      (h.gir ? " " + (h.gir === "Y" ? "GIR" : "no-GIR") : "") +
      (h.putts != null ? " putts " + h.putts : ""));
  });
  return L.join("\n");
}
function mailLink(){
  var href = "mailto:" + EMAIL + "?subject=" + encodeURIComponent(
    "Simple Round Tracker - " + (course || "Unnamed course") + " " + (rdate || todayISO())) +
    "&body=" + encodeURIComponent(summaryText());
  return '<a class="mailbtn" href="' + href + '">Email me a copy</a>';
}
function saveRound(){
  var t = totals();
  var body = {
    date: rdate || todayISO(), course: course || "Unnamed course", par: roundPar(),
    score: t.score, front9: t.f9, back9: t.b9,
    fw: t.fwH, gir: t.girH, putts: t.putts
  };
  saved = "Sending&hellip;"; render();
  fetch(SHEET_HOOK, { method:"POST", headers:{"Content-Type":"text/plain"}, body: JSON.stringify(body) })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if (!j.ok) throw new Error(j.error || "sheet said not-ok");
      saved = "<b>Round sent to your Golf Tracker sheet.</b>" + mailLink();
      render();
    })
    .catch(function(){
      saved = "Could not reach the sheet — email the summary instead." + mailLink();
      render();
    });
}

document.querySelectorAll(".tab").forEach(function(b){
  b.addEventListener("click", function(){ tab = b.dataset.tab; render(); });
});
var ci = document.getElementById("in-course"), di = document.getElementById("in-date");
ci.addEventListener("change", function(){ course = ci.value.trim(); lsSave(); });
di.addEventListener("change", function(){ rdate = di.value; lsSave(); });

lsLoad();
ci.value = course; di.value = rdate || todayISO();
var firstOpen = holes.findIndex(function(h){ return h.score == null; });
hole = firstOpen >= 0 ? firstOpen + 1 : 18;
render();
})();
</script>
</body>
